version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    versioning-strategy: increase
    commit-message:
      prefix: "chore"
      include: scope
    labels:
      - dependencies
      - dependabot
    ignore:
      - dependency-name: eslint
        versions:
          - ">=10"
    groups:
      npm-production:
        dependency-type: production
      npm-development:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore"
      include: scope
    labels:
      - dependencies
